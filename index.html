<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Kei.works ViewTune Final-Logic</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<style>
body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; touch-action: none; position: fixed; width: 100%; height: 100%; }

#splash { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.8s ease-in-out; pointer-events: none; }
.splash-logo { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 100; letter-spacing: 12px; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

.main-wrapper { display: flex; width: 100vw; height: 100vh; visibility: hidden; position: relative; background: #000; overflow: hidden; } 
.main-wrapper:fullscreen { width: 100vw; height: 100vh; }

aside { 
  width: 300px; min-width: 150px; max-width: 80vw; height: 100vh; background: #111; border-right: 1px solid #333; 
  display: flex; flex-direction: column; align-items: center; padding: 15px 10px 30px; box-sizing: border-box;
  overflow-y: auto; overflow-x: hidden; z-index: 1000; transition: transform 0.3s ease, margin-left 0.3s ease; flex-shrink: 0;
}
aside.hidden { transform: translateX(-100%); margin-left: -300px; }

#toggle-btn {
  position: absolute; top: 50%; left: 300px; transform: translateY(-50%); z-index: 9999;
  width: 20px; height: 80px; background: #222; border: 1px solid #444; border-left: none;
  border-radius: 0 8px 8px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: left 0.3s ease;
}
#toggle-btn.is-hidden { left: 0 !important; }
#toggle-btn::after { content: ""; width: 2px; height: 20px; background: #fff; border-radius: 2px; }

#fs-btn {
  position: absolute; top: 15px; right: 15px; z-index: 150; width: 40px; height: 40px; background: rgba(50,50,50,0.6);
  border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; cursor: pointer; backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center;
}

#resizer { width: 14px; cursor: col-resize; background: transparent; z-index: 101; margin-left: -7px; flex-shrink: 0; }
.sep { width: 100%; border-bottom: 1px solid #444; margin: 15px 0; flex-shrink: 0; }
#clock-cvs { width: 90%; height: auto; aspect-ratio: 1/1; max-width: 600px; flex-shrink: 0; }
#digital-clock { font-size: 2.2rem; margin: 5px 0; font-variant-numeric: tabular-nums; width: 100%; text-align: center; flex-shrink: 0; }

.round-btn { width: 42px; height: 42px; border-radius: 50%; background: #ddd; color: #000; border: none; font-size: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.btn-row { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; margin: 8px 0; flex-shrink: 0; }
.file-select-btn { cursor: pointer; background: #ddd; color: #000; padding: 7px 0; width: 85%; border-radius: 6px; font-size: 11px; font-weight: 700; text-align: center; margin: 0 auto 5px; display: block; flex-shrink: 0; }
.info-label { font-size: 12px; color: #fff; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 5px; flex-shrink: 0; }

.mode-switch { width: 85%; display: flex; background: #333; border-radius: 15px; margin: 5px auto 0; padding: 2px; flex-shrink: 0; }
.mode-btn { flex: 1; border: none; background: none; color: #888; font-size: 10px; font-weight: 700; padding: 6px 0; cursor: pointer; border-radius: 13px; }
.mode-btn.active { background: #fff; color: #000; }

#pdf-container { flex: 1; background: #111; position: relative; overflow: hidden; touch-action: none; }
/* ポイント：中心を基準に並行移動させる設定 */
#pdf-canvas { position: absolute; top: 0; left: 0; display: block; transform-origin: 0 0; will-change: transform; }

.audio-row { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; margin-top: 5px; flex-shrink: 0; }
#time-text { font-size: 12px; color: #fff; font-weight: 600; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div id="splash"><div class="splash-logo">Kei.works</div></div>

<div class="main-wrapper" id="main-content">
  <button id="toggle-btn"></button>
  <aside id="sidebar">
    <canvas id="clock-cvs"></canvas>
    <div id="digital-clock">00:00:00</div>
    <div class="sep"></div>
    <label for="f-p" class="file-select-btn">PDF選択</label>
    <input type="file" id="f-p" accept="application/pdf" style="display:none">
    <div id="pdf-name" class="info-label">PDF未選択</div>
    <div class="btn-row">
      <button id="b-p" class="round-btn">←</button>
      <div id="page-num" style="min-width:60px;text-align:center">0 / 0</div>
      <button id="n-pg" class="round-btn">→</button>
    </div>
    <div class="mode-switch">
      <button id="m-free" class="mode-btn active">FREE</button>
      <button id="m-fix" class="mode-btn">FIX</button>
    </div>
    <div class="sep"></div>
    <label for="f-a" class="file-select-btn">曲選択</label>
    <input type="file" id="f-a" accept="audio/*" style="display:none">
    <div id="audio-name" class="info-label">曲未選択</div>
    <div class="audio-row">
      <button id="p-b" class="round-btn">▶</button>
      <div id="time-text">0:00/0:00</div>
    </div>
    <div class="sep"></div>
    <div style="font-size:9px;color:#444;margin-top:20px;">©Kei.works</div>
  </aside>

  <div id="resizer"></div>
  <main id="pdf-container">
    <button id="fs-btn">⛶</button>
    <canvas id="pdf-canvas"></canvas>
  </main>
</div>

<script>
(function(){
  const splash = document.getElementById('splash'), main = document.getElementById('main-content');
  const unlock = () => { splash.style.opacity='0'; main.style.visibility='visible'; setTimeout(()=>splash.style.display='none', 800); };
  window.addEventListener('load', unlock); setTimeout(unlock, 3000);

  const sidebar = document.getElementById('sidebar'), resizer = document.getElementById('resizer'), toggleBtn = document.getElementById('toggle-btn');
  const cvs = document.getElementById('pdf-canvas'), container = document.getElementById('pdf-container');
  let currentWidth = 300, isResizing = false;

  // --- PDF制御変数 ---
  let doc=null, pn=1;
  let sc = 1.0, posX = 0, posY = 0; // キャンバスの左上座標
  let isFreeMode = true;

  function updateTransform() {
    // 完全にtranslateとscaleで位置を決定
    cvs.style.transform = `translate(${posX}px, ${posY}px) scale(${sc})`;
  }

  // --- 全画面 ---
  document.getElementById('fs-btn').onclick = () => {
    const target = main;
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      if (target.requestFullscreen) target.requestFullscreen();
      else if (target.webkitRequestFullscreen) target.webkitRequestFullscreen();
    } else {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
  };

  const syncFS = () => { updateTransform(); };
  document.addEventListener('fullscreenchange', syncFS); document.addEventListener('webkitfullscreenchange', syncFS);

  // --- サイドバー制御 ---
  toggleBtn.onclick = () => {
    const isH = sidebar.classList.toggle('hidden');
    toggleBtn.style.left = isH ? "0px" : currentWidth + "px";
    sidebar.style.marginLeft = isH ? `-${currentWidth}px` : "0";
    toggleBtn.classList.toggle('is-hidden');
    // アニメーション完了後に位置を再計算
    setTimeout(updateTransform, 310);
  };

  // --- 時計 ---
  function tick(){
    const d=new Date(); document.getElementById('digital-clock').textContent=d.toTimeString().split(' ')[0];
    const c=document.getElementById('clock-cvs'), ctx=c.getContext('2d');
    c.width=600; c.height=600; ctx.translate(300,300);
    ctx.beginPath(); ctx.arc(0,0,280,0,Math.PI*2); ctx.strokeStyle='#fff'; ctx.lineWidth=6; ctx.stroke();
    for(let i=0; i<60; i++){
      ctx.save(); ctx.rotate(i*6*Math.PI/180); ctx.beginPath(); ctx.moveTo(0,-280); ctx.lineTo(0,(i%5===0?-250:-265)); ctx.strokeStyle='#fff'; ctx.lineWidth=(i%5===0?6:2); ctx.stroke(); ctx.restore();
    }
    ctx.fillStyle='#fff'; ctx.font='bold 44px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    for(let i=1; i<=12; i++){ const a=(i*30-90)*(Math.PI/180); ctx.fillText(i, Math.cos(a)*215, Math.sin(a)*215); }
    const h=(d.getHours()%12+d.getMinutes()/60)*30, m=d.getMinutes()*6, s=d.getSeconds()*6;
    const draw = (deg,len,w,col) => { ctx.save(); ctx.rotate(deg*Math.PI/180); ctx.beginPath(); ctx.moveTo(0,30); ctx.lineTo(0,-len); ctx.strokeStyle=col; ctx.lineWidth=w; ctx.lineCap='round'; ctx.stroke(); ctx.restore(); };
    draw(h,160,14,'#fff'); draw(m,230,10,'#fff'); draw(s,250,5,'#ff3b30');
  }
  setInterval(tick, 1000); tick();

  // --- PDF描画 ---
  const pdfjs = window['pdfjs-dist/build/pdf'];
  pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

  async function render(){
    if(!doc) return;
    const pg = await doc.getPage(pn);
    const dpr = window.devicePixelRatio || 1;
    // PDF自体の解像度を維持するためのViewport（scale:1で描画し、CSSで拡大縮小する）
    const vp = pg.getViewport({scale: dpr * 1.5}); 
    cvs.width = vp.width; cvs.height = vp.height;
    cvs.style.width = (vp.width / dpr) + 'px';
    cvs.style.height = (vp.height / dpr) + 'px';
    await pg.render({canvasContext: cvs.getContext('2d'), viewport: vp}).promise;
    document.getElementById('page-num').textContent = pn + " / " + doc.numPages;
    updateTransform();
  }

  document.getElementById('f-p').onchange = (e) => {
    const f = e.target.files[0]; if(!f) return;
    document.getElementById('pdf-name').textContent = f.name;
    const r = new FileReader();
    r.onload = async function(){
      doc = await pdfjs.getDocument({data: new Uint8Array(this.result)}).promise;
      pn = 1; sc = 1.0; posX = 0; posY = 0; render();
    };
    r.readAsArrayBuffer(f);
  };

  // --- タッチ操作（スクロール不使用方式） ---
  let lastDist = 0, lastTouchX = 0, lastTouchY = 0;
  let isPinching = false;

  container.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      isPinching = true;
      lastDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
    } else if (e.touches.length === 1) {
      isPinching = false;
      lastTouchX = e.touches[0].pageX;
      lastTouchY = e.touches[0].pageY;
    }
  }, {passive: false});

  container.addEventListener('touchmove', (e) => {
    e.preventDefault(); // ブラウザのスクロールを完全に殺す

    if (e.touches.length === 2 && isPinching) {
      const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
      const zoom = dist / lastDist;
      const newSc = Math.min(Math.max(sc * zoom, 0.2), 6.0);
      
      // 指の中心を基準にズームする計算
      const centerX = (e.touches[0].pageX + e.touches[1].pageX) / 2;
      const centerY = (e.touches[0].pageY + e.touches[1].pageY) / 2;
      const rect = container.getBoundingClientRect();
      const relX = centerX - rect.left - posX;
      const relY = centerY - rect.top - posY;

      posX -= relX * (newSc / sc - 1);
      posY -= relY * (newSc / sc - 1);
      sc = newSc;
      lastDist = dist;
    } else if (e.touches.length === 1 && !isPinching && isFreeMode) {
      const dx = e.touches[0].pageX - lastTouchX;
      const dy = e.touches[0].pageY - lastTouchY;
      posX += dx;
      posY += dy;
      lastTouchX = e.touches[0].pageX;
      lastTouchY = e.touches[0].pageY;
    }
    updateTransform();
  }, {passive: false});

  // --- モード切替 ---
  const btnFix = document.getElementById('m-fix'), btnFree = document.getElementById('m-free');
  btnFix.onclick = () => { isFreeMode=false; btnFix.classList.add('active'); btnFree.classList.remove('active'); };
  btnFree.onclick = () => { isFreeMode=true; btnFree.classList.add('active'); btnFix.classList.remove('active'); };

  // --- オーディオ（Edge/iOS 対策込） ---
  const au = new Audio(), pb = document.getElementById('p-b'), fa = document.getElementById('f-a');
  let audioFile = null;

  fa.onchange = (e) => {
    if (e.target.files[0]) {
      audioFile = e.target.files[0];
      document.getElementById('audio-name').textContent = audioFile.name;
      if (au.src) URL.revokeObjectURL(au.src);
      au.src = ""; // リセット
      pb.textContent = "▶";
    }
  };

  pb.onclick = () => {
    if (!audioFile) return;
    if (!au.src || au.src === "") {
      au.src = URL.createObjectURL(audioFile);
      au.load();
    }
    if (au.paused) {
      au.play().then(() => { pb.textContent = "||"; }).catch(() => {
        setTimeout(() => { au.play(); pb.textContent = "||"; }, 150);
      });
    } else {
      au.pause(); pb.textContent = "▶";
    }
  };

  au.ontimeupdate = () => {
    const f=(t)=>{ if(!t||isNaN(t))return "0:00"; const m=Math.floor(t/60),s=Math.floor(t%60); return m+":"+s.toString().padStart(2,'0'); };
    document.getElementById('time-text').textContent = f(au.currentTime)+"/"+f(au.duration);
  };

  document.getElementById('b-p').onclick=()=>{if(doc&&pn>1){pn--;render();}};
  document.getElementById('n-pg').onclick=()=>{if(doc&&pn<doc.numPages){pn++;render();}};
})();
</script>
</body>
</html>
